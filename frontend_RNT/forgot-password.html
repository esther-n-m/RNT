<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forgot_password</title>
</head>
<body>
    <form id="forgot-form" style="max-width: 400px; margin: 100px auto; color: white;">
    <h2>Forgot Password</h2>
    <input type="email" id="email" placeholder="Enter your email" required style="width: 100%; padding: 10px; margin: 10px 0;">
    <button type="submit" style="background: #c9a45c; width: 100%; padding: 10px; cursor: pointer;">Send Reset Link</button>
</form>

<script>
    const API_URL = "https://rnt-backend.onrender.com";
    
    document.getElementById('forgot-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const res = await fetch('https://rnt-backend.onrender.com/api/forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        alert(data.message);
    };
</script>
</body>
</html>
