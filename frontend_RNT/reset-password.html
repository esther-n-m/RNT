<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reset_password</title>
</head>
<body>
    <main style="padding: 40px; text-align: center; background: #0b0b0e; color: white; min-height: 100vh;">
    <h1 style="color: #c9a45c;">Create New Password</h1>
    <p style="color: rgba(255,255,255,0.6);">Secure your RNT Atelier account.</p>

    <form id="reset-form" style="max-width: 400px; margin: 40px auto;">
        <input type="password" id="new-password" placeholder="New Password" required 
               style="width: 100%; padding: 15px; margin-bottom: 20px; background: #16161d; border: 1px solid #2a2a35; color: white;">
        
        <button type="submit" style="width: 100%; padding: 15px; background: #c9a45c; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold;">
            Update Password
        </button>
    </form>
</main>

<script>
    document.getElementById('reset-form').onsubmit = async (e) => {
        e.preventDefault();

        // 1. Get the token from the URL bar (e.g., ?token=abcdef...)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert("Error: No reset token found in the URL.");
            return;
        }

        const newPassword = document.getElementById('new-password').value;

        try {
            // 2. Send the token and new password to the backend
            const response = await fetch(`http://localhost:3000/api/reset-password/${token}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: newPassword })
            });

            const data = await response.json();

            if (data.success) {
                alert("Success! Your password has been updated. Please log in.");
                window.location.href = 'auth.html';
            } else {
                alert("Error: " + data.message);
            }
        } catch (error) {
            console.error("Reset error:", error);
            alert("Failed to connect to the server.");
        }
    };
</script>
</body>
</html>
