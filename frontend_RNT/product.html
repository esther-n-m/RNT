<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details | RNT Atelier</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            max-width: 1200px;
            margin: 100px auto;
            padding: 0 40px;
            align-items: center;
        }
        .product-image img {
            width: 100%;
            background: #16161d;
            border-radius: 4px;
        }
        .product-info h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .price-tag { color: #c9a45c; font-size: 1.5rem; margin-bottom: 30px; }
        .description { line-height: 1.8; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo-area">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <h1>RNT Scented Candles</h1>
                <p>Scented Candles & Cozy Pillows</p>
            </a>
        </div>
        <div class="nav-icons">
            <a href="auth.html" class="auth-link" id="auth-link">Login</a>

            <div id="cart-icon-container">
                <svg class="bag-icon" viewBox="0 0 24 24" fill="none" stroke="#c9a45c" stroke-width="1.5">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0" />
                </svg>
                <span id="cart-count">0</span>
            </div>
        </div>
    </div>
</header>

    <div class=\"product-detail-container\">
        <div class="product-image">
            <img id="main-product-image" src="" alt="Product Image">
        </div>
        <div class="product-info">
            <h1 id="product-name">Loading...</h1>
            <div class="price-tag" id="product-price"></div>
            <p class="description" id="product-desc"></p>
            <button onclick="addToCartFromDetails()" class="checkout-btn" style="width: 100%; padding: 20px; background: #c9a45c; border: none; font-weight: bold; cursor: pointer;">
                ADD TO COLLECTION
            </button>
        </div>
    </div>

<script src="javascript/script.js"></script>

    <script>
        // Logic to load data from script.js product array
        const params = new URLSearchParams(window.location.search);
        const productName = params.get('name');

        // This assumes your products array is accessible (usually via script.js)
        // For now, we find the product that matches the URL name
        const product = products.find(p => p.name === productName);

        function addToCartFromDetails() {
    const params = new URLSearchParams(window.location.search);
    const productName = params.get('name');
    
    // Call the original addToCart function from script.js
    if (typeof addToCart === "function") {
        addToCart(productName);
        alert(`${productName} added to your collection.`);
    }
}

        if (product) {
            document.getElementById('product-name').innerText = product.name;
            document.getElementById('product-price').innerText = `KES ${product.price.toLocaleString()}`;
            document.getElementById('product-desc').innerText = product.description;
            document.getElementById('main-product-image').src = product.image;
        }

async function loadProductDetails() {
    const urlParams = new URLSearchParams(window.location.search);
    const productName = urlParams.get('name');

    // Fetch from RENDER, not localhost
    const res = await fetch('https://rnt-backend.onrender.com/api/products');
    const products = await res.json(); // Now 'products' is defined!

    const product = products.find(p => p.name === productName);
    
    if (product) {
        document.getElementById('product-title').innerText = product.name;
        // ... fill in the rest of your luxury details here
    }
}
loadProductDetails();

    </script>
</body>
</html>
