<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details | RNT Atelier</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            max-width: 1200px;
            margin: 100px auto;
            padding: 0 40px;
            align-items: center;
        }
        .product-image img {
            width: 100%;
            background: #16161d;
            border-radius: 4px;
        }
        .product-info h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .price-tag { color: #c9a45c; font-size: 1.5rem; margin-bottom: 30px; }
        .description { line-height: 1.8; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo-area">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <h1>RNT Scented Candles</h1>
                <p>Scented Candles & Cozy Pillows</p>
            </a>
        </div>
        <div class="nav-icons">
            <a href="auth.html" class="auth-link" id="auth-link">Login</a>

            <div id="cart-icon-container">
                <svg class="bag-icon" viewBox="0 0 24 24" fill="none" stroke="#c9a45c" stroke-width="1.5">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0" />
                </svg>
                <span id="cart-count">0</span>
            </div>
        </div>
    </div>
</header>

    <div class=\"product-detail-container\">
        <div class="product-image">
            <img id="main-product-image" src="" alt="Product Image">
        </div>
        <div class="product-info">
            <h1 id="product-name">Loading...</h1>
            <div class="price-tag" id="product-price"></div>
            <p class="description" id="product-desc"></p>
            <button onclick="addToCartFromDetails()" class="checkout-btn" style="width: 100%; padding: 20px; background: #c9a45c; border: none; font-weight: bold; cursor: pointer;">
                ADD TO COLLECTION
            </button>
        </div>
    </div>

<script src="javascript/script.js"></script>
<script>
    async function loadProductDetails() {
        const params = new URLSearchParams(window.location.search);
        const productName = params.get('name');

        if (!productName) {
            console.error("No product name found in URL");
            return;
        }

        try {
            const res = await fetch('https://rnt-backend.onrender.com/api/products');
            if (!res.ok) throw new Error("Server response was not ok");
            
            const products = await res.json();
            const product = products.find(p => p.name === productName);

            if (product) {
                // We only target IDs that exist in the HTML body above
                const nameEl = document.getElementById('product-name');
                const priceEl = document.getElementById('product-price');
                const descEl = document.getElementById('product-desc');
                const imgEl = document.getElementById('main-product-image');

                if(nameEl) nameEl.innerText = product.name;
                if(priceEl) priceEl.innerText = `KES ${product.price.toLocaleString()}`;
                if(descEl) descEl.innerText = product.description;
                if(imgEl) imgEl.src = product.image;
                
                document.title = `${product.name} | RNT Atelier`; // Bonus: Updates browser tab name
            } else {
                document.getElementById('product-name').innerText = "Product Not Found";
            }
        } catch (error) {
            console.error("Error connecting to the Atelier server:", error);
            document.getElementById('product-name').innerText = "Server Error. Please try again.";
        }
    }

    function addToCartFromDetails() {
        const params = new URLSearchParams(window.location.search);
        const productName = params.get('name');
        
        if (typeof addToCart === "function") {
            addToCart(productName);
            alert(`${productName} added to your collection.`);
        } else {
            console.error("addToCart function not found in script.js");
        }
    }

    loadProductDetails();
</script>
</body>
</html>
