<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Atelier | Account</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body style="background: #0b0b0e; color: #fff;">
    <div class="dashboard-wrapper"
        style="display: grid; grid-template-columns: 250px 1fr; max-width: 1000px; margin: 100px auto;">

        <nav style="border-right: 1px solid #2a2a35; padding: 20px;">
            <h2 style="font-size: 1rem; color: #c9a45c;">MY ATELIER</h2>
            <ul style="list-style: none; padding: 0; margin-top: 40px;">
                <li style="margin-bottom: 20px;"><a href="#" style="color: #fff; text-decoration: none;">Order
                        History</a></li>
                <li style="margin-bottom: 20px;"><a href="#" style="color: #fff; text-decoration: none;">Saved
                        Address</a></li>
                <!--ensures the logout happens first before going to another page-->
                <li><a href="javascript:void(0)" onclick="performLogout()"
                        style="color: #888; text-decoration: none;">Logout</a></li>
            </ul>
        </nav>

        <main style="padding: 20px 40px;">
            <h1 id="welcome-message">Welcome back, Valued Client</h1>

            <section id="order-history">
                <h3 style="color: #c9a45c; margin-top: 40px;">Previous Collections</h3>

                <div id="order-history-list">
                    <p style="color: rgba(255,255,255,0.5);">Loading your collection history...</p>
                </div>
            </section>

            <div style="margin-top: 40px; text-align: center;">
                <a href="index.html"
                    style="text-decoration: none; border: 1px solid #c9a45c; color: #c9a45c; padding: 15px 30px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;">
                    Return to Shop
                </a>
            </div>
        </main>
    </div>

    <script src="javascript/account.js"></script>
</body>

</html>
