<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Atelier | Account</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body style="background: #0b0b0e; color: #fff;">
    <div class="dashboard-wrapper" style="display: grid; grid-template-columns: 250px 1fr; max-width: 1000px; margin: 100px auto;">
        
        <nav style="border-right: 1px solid #2a2a35; padding: 20px;">
            <h2 style="font-size: 1rem; color: #c9a45c;">MY ATELIER</h2>
            <ul style="list-style: none; padding: 0; margin-top: 40px;">
                <li style="margin-bottom: 20px;"><a href="#" style="color: #fff; text-decoration: none;">Order History</a></li>
                <li style="margin-bottom: 20px;"><a href="#" style="color: #fff; text-decoration: none;">Saved Address</a></li>
                <!--ensures the logout happens first before going to another page-->
                <li><a href="javascript:void(0)" onclick="performLogout()" style="color: #888; text-decoration: none;">Logout</a></li>
            </ul>
        </nav>

        <main style="padding: 20px 40px;">
            <h1 id="welcome-message">Welcome back, Valued Client</h1>
            <section id="order-history">
                <h3 style="color: #c9a45c; margin-top: 40px;">Previous Collections</h3>
                <div class="order-item" style="border: 1px solid #2a2a35; padding: 20px; margin-top: 20px;">
                    <p>Order #RNT-8821 | Status: Delivered | Total: KES 4,500</p>
                </div>
            </section>
        </main>
    </div>

    <script src="javascript/account.js"></script>
</body>
</html>
